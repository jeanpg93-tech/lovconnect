  <script>
    // Aplica dark mode antes do JS principal carregar — evita flash branco em conexões lentas (mobile).
    try {
      var k = "lov-theme-user-choice-v2";
      var saved = localStorage.getItem("lov-theme");
      var hasChoice = localStorage.getItem(k) === "true";
      var t = hasChoice && (saved === "light" || saved === "dark") ? saved : "dark";
      if (t === "dark") document.documentElement.classList.add("dark");
    } catch (_) { document.documentElement.classList.add("dark"); }
  </script>
  <style>
    html, body { background: #0b0a14; }
    html.light, html.light body { background: #ffffff; }
    #lov-boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #0b0a14; z-index: 99999;
    }
    html.light #lov-boot { background: #ffffff; }
    #lov-boot .ring {
      width: 44px; height: 44px; border-radius: 50%;
      border: 3px solid rgba(124,58,237,0.18);
      border-top-color: #7C3AED;
      animation: lov-spin 0.9s linear infinite;
    }
    @keyframes lov-spin { to { transform: rotate(360deg); } }
  </style>
</head>

  <body>
    <div id="root"></div>
    <div id="lov-boot"><div class="ring"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
